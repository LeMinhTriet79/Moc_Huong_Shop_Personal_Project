server:
  port: 8083

spring:
  application:
    name: order-service

  # C?u hýnh k?t n?i MySQL
  datasource:
    url: jdbc:mysql://localhost:3306/order_db?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh
    username: root
    password: 12345

  # C?u hýnh JPA & Hibernate
  jpa:
    hibernate:
      ddl-auto: none # ?? Flyway t? qu?n l² b?ng, JPA ch? validate
    show-sql: true
    properties:
      hibernate.dialect: org.hibernate.dialect.MySQLDialect

  # C?u hýnh Redis
  data:
    redis:
      host: localhost
      port: 6379

  # C?u hýnh Kafka Producer (?Ò ???c ??a v? ?·ng chu?n c?a Spring)
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

