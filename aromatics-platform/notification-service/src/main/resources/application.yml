server:
  port: 8084

spring:
  application:
    name: notification-service

  # C?u h́nh k?t n?i MySQL
  datasource:
    url: jdbc:mysql://localhost:3306/notification_db?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh
    username: root
    password: 12345

  # C?u h́nh JPA & Hibernate
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate.dialect: org.hibernate.dialect.MySQLDialect

  # C?u h́nh Redis
  data:
    redis:
      host: localhost
      port: 6379

  # C?u h́nh Kafka Consumer
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        # BÍ QUY?T GI?I QUY?T L?I V̉NG L?P N?M ? ?ÂY:
        spring.json.value.default.type: java.util.HashMap

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

# C?u h́nh JWT
jwt:
  secret: 4b6a4a6e744e6b726466384a51356f5a774652417757367838536b5952674261
  expiration: 900000
  refresh-expiration: 604800000